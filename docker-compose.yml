version: "3.9"

services:
  db:
    image: postgres:15
    container_name: synctask_db
    environment:
      POSTGRES_USER: synctask
      POSTGRES_PASSWORD: Cmrec@1234
      POSTGRES_DB: synctask_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: synctask_backend
    environment:
      DATABASE_URL: postgresql://synctask:Cmrec%401234@db:5432/synctask_db
      SECRET_KEY: a8f3b2c9d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: synctask_frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:

